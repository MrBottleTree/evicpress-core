syntax = "proto3";

package evicpress;

// EvicPressService is Machine B's gRPC interface.
// Machine A calls these to store, retrieve, prefetch, and inspect KV cache blocks.
service EvicPressService {
  // Lookup: check if a block exists and which tier it's in. O(1).
  rpc Lookup (LookupRequest) returns (LookupResponse);

  // Store: save a KV block from Machine A. Machine B decides placement.
  rpc Store (StoreRequest) returns (StoreResponse);

  // Retrieve: fetch a KV block's data. Promotes tier3->tier2 opportunistically.
  rpc Retrieve (RetrieveRequest) returns (RetrieveResponse);

  // Prefetch: hint Machine B to move blocks to faster tiers proactively.
  rpc Prefetch (PrefetchRequest) returns (PrefetchResponse);

  // Delete: remove a block explicitly (e.g., context invalidated).
  rpc Delete (DeleteRequest) returns (DeleteResponse);

  // GetStats: pull current cache stats for monitoring.
  rpc GetStats (StatsRequest) returns (StatsResponse);
}

// --- Lookup ---
message LookupRequest {
  string block_id = 1;
}
message LookupResponse {
  bool  hit                   = 1;
  int32 tier                  = 2;  // 0 = miss, 1 = Machine A RAM (ledger), 2 = Machine B RAM, 3 = Disk
  repeated string evict_from_t1 = 3;  // Block IDs Machine A must evict from T1 and return here.
}

// --- Store ---
message StoreRequest {
  string block_id      = 1;
  bytes  data          = 2;  // Serialized KV tensor (opaque bytes)
  float  quality_score = 3;  // 0.0–1.0. How sensitive this block is to compression.
  bool   is_t1_return  = 4;  // True when Machine A is returning an evicted T1 block; skip T1 re-promotion.
}
message StoreResponse {
  bool   success              = 1;
  int32  tier                 = 2;  // 1 = promote to Machine A RAM; 2/3 = stored on Machine B only
  string message              = 3;  // Optional debug message
  repeated string evict_from_t1 = 4;  // Block IDs Machine A must evict from T1 and return here.
}

// --- Retrieve ---
message RetrieveRequest {
  string block_id = 1;
}
message RetrieveResponse {
  bool   found = 1;
  bytes  data  = 2;
  int32  tier  = 3;  // Tier from which it was retrieved
}

// --- Prefetch ---
message PrefetchRequest {
  repeated string block_ids = 1;  // Blocks to move to faster tiers
}
message PrefetchResponse {
  int32 queued = 1;  // How many were accepted into the prefetch queue
}

// --- Delete ---
message DeleteRequest {
  string block_id = 1;
}
message DeleteResponse {
  bool success = 1;
}

// --- Stats ---
message StatsRequest {}
message StatsResponse {
  int64 tier2_blocks      = 1;
  int64 tier3_blocks      = 2;
  int64 tier2_bytes       = 3;
  int64 tier3_bytes       = 4;
  int64 total_hits        = 5;
  int64 total_misses      = 6;
  int64 tier2_hits        = 7;
  int64 tier3_hits        = 8;
  float hit_rate          = 9;
  int64 evictions         = 10;
  // Tier 1: Machine B's local ledger of blocks promoted to Machine A RAM.
  // Full stats available via REST /api/state (no regeneration needed for dashboard).
  int64 tier1_blocks      = 11;
  int64 tier1_bytes       = 12;
  int64 tier1_promotions  = 13;
}
